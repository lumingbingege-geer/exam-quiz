<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>案例300问 · 答题练习</title>
<style>
  :root{
    --bg-deep:#0A2E4D;
    --bg-panel:#0F3A5E;
    --bg-card:#123F63;
    --line-grid:rgba(255,255,255,0.055);
    --border-soft:rgba(255,255,255,0.14);
    --amber:#F0A93A;
    --amber-dim:rgba(240,169,58,0.16);
    --cyan:#8FD6E8;
    --text-main:#EAF2F8;
    --text-dim:#93AEC4;
    --green:#5BC28A;
    --green-dim:rgba(91,194,138,0.14);
    --red:#E8695F;
    --red-dim:rgba(232,105,95,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      linear-gradient(var(--line-grid) 1px, transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg, var(--line-grid) 1px, transparent 1px) 0 0/28px 28px,
      var(--bg-deep);
    font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
    color:var(--text-main);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .mono{font-family:'JetBrains Mono','Roboto Mono',ui-monospace,monospace;}

  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:rgba(10,30,50,0.35);
    border-left:1px solid var(--border-soft);
    border-right:1px solid var(--border-soft);
    position:relative;
  }

  /* Title block – blueprint drawing header */
  .titleblock{
    padding:14px 16px 10px;
    border-bottom:2px solid var(--amber);
    position:relative;
  }
  .titleblock::before, .titleblock::after{
    content:"";
    position:absolute;
    width:10px; height:10px;
    border:1.5px solid var(--cyan);
    opacity:0.7;
  }
  .titleblock::before{ top:6px; left:6px; border-right:none; border-bottom:none; }
  .titleblock::after{ top:6px; right:6px; border-left:none; border-bottom:none; }
  .tb-row1{ display:flex; justify-content:space-between; align-items:baseline; }
  .tb-name{ font-size:22px; font-weight:700; letter-spacing:1px; }
  .tb-sub{ font-size:13px; color:var(--text-dim); margin-top:3px;}
  .tb-count{ font-size:16px; color:var(--amber); }
  .progressbar{ height:4px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; overflow:hidden;}
  .progressbar > div{ height:100%; background:linear-gradient(90deg,var(--amber),var(--cyan)); width:0%; transition:width .3s; }

  /* Mode + filter tabs */
  .controls{
    display:flex; gap:8px;
    padding:10px 16px;
    flex-wrap:wrap;
  }
  .pill{
    font-size:15px;
    padding:10px 16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.22);
    background:rgba(255,255,255,0.08);
    color:var(--text-main);
    cursor:pointer;
    white-space:nowrap;
    font-weight:600;
  }
  .pill.active{
    background:var(--amber);
    border-color:var(--amber);
    color:#1A2E3F;
    font-weight:700;
  }

  .main{ flex:1; padding:6px 16px 100px; display:flex; flex-direction:column; }

  .card{
    background:var(--bg-card);
    border:1px solid var(--border-soft);
    border-radius:12px;
    padding:20px 18px;
    position:relative;
    margin-top:10px;
  }
  .card-tag{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px;
    padding-right:46px;
  }
  .qnum{
    font-size:14px;
    color:var(--bg-deep);
    background:var(--cyan);
    padding:4px 10px;
    border-radius:5px;
    font-weight:700;
  }
  .page-ref{
    font-size:13px;
    color:var(--text-dim);
    border:1px solid var(--border-soft);
    padding:4px 10px;
    border-radius:5px;
  }
  .q-text{
    font-size:21px;
    line-height:1.55;
    font-weight:700;
    margin-bottom:4px;
  }
  .divider{ height:1px; background:var(--border-soft); margin:16px 0; }
  .label{
    font-size:13px;
    letter-spacing:2px;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
    font-weight:700;
  }
  .label::before{ content:"◆"; font-size:10px; }
  .answer-text{ font-size:18px; line-height:1.75; color:var(--text-main); white-space:pre-line; font-weight:500; }
  .tip-text{ font-size:16px; line-height:1.65; color:var(--cyan); font-weight:600; }

  .reveal-btn{
    width:100%;
    margin-top:18px;
    padding:15px;
    border-radius:10px;
    border:1.5px dashed var(--amber);
    background:transparent;
    color:var(--amber);
    font-size:17px;
    font-weight:700;
    cursor:pointer;
  }
  .reveal-btn:active{ background:var(--amber-dim); }

  .self-check{ display:flex; gap:8px; margin-top:16px; }
  .self-check button{
    flex:1; padding:13px; border-radius:9px; font-size:15px; font-weight:700;
    border:1px solid var(--border-soft); background:transparent; color:var(--text-dim); cursor:pointer;
  }

  .practice-box{ margin-top:16px; }
  .practice-label{ font-size:14px; color:var(--amber); font-weight:700; margin-bottom:8px; letter-spacing:1px; }
  .practice-box textarea{
    width:100%;
    min-height:100px;
    background:rgba(255,255,255,0.06);
    border:1.5px solid var(--border-soft);
    border-radius:10px;
    padding:14px;
    font-size:17px;
    line-height:1.6;
    color:var(--text-main);
    font-family:inherit;
    resize:vertical;
    box-sizing:border-box;
  }
  .practice-box textarea:focus{ outline:none; border-color:var(--amber); }
  .practice-box textarea::placeholder{ color:var(--text-dim); }
  .my-answer-text{
    font-size:17px; line-height:1.65; color:var(--cyan); white-space:pre-line;
    background:rgba(255,255,255,0.04); border-radius:8px; padding:12px;
    border:1px solid rgba(255,255,255,0.1);
  }

  .swipe-hint{
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
    margin-top:10px;
    letter-spacing:2px;
    opacity:0.6;
  }
  .card{ touch-action: pan-y; }
  .card.swiping{ transition:none; }
  .card.swipe-return{ transition: transform 0.25s ease; }
  .self-check button.master.on{ background:var(--green-dim); border-color:var(--green); color:var(--green); }
  .self-check button.weak.on{ background:var(--red-dim); border-color:var(--red); color:var(--red); }

  .star-btn{
    position:absolute; top:14px; right:18px;
    background:none; border:none; font-size:26px; cursor:pointer;
    color:var(--text-dim);
    line-height:1;
    padding:6px;
  }
  .star-btn.on{ color:var(--amber); }

  .all-answers-note{
    font-size:14px; color:var(--text-dim); text-align:center; padding:10px 0 0;
  }

  /* Bottom nav */
  .bottomnav{
    position:fixed;
    bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    background:var(--bg-panel);
    border-top:1px solid var(--border-soft);
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    gap:8px;
  }
  .navbtn{
    flex:1;
    padding:15px 0;
    border-radius:10px;
    border:1px solid var(--border-soft);
    background:var(--bg-card);
    color:var(--text-main);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    text-align:center;
  }
  .navbtn.primary{ background:var(--amber); color:var(--bg-deep); border-color:var(--amber); }
  .navbtn:disabled{ opacity:0.35; }
  .navbtn.icon{ flex:0 0 auto; width:52px; padding:15px 0; font-size:20px; }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-dim);
    font-size:15px;
  }
  .empty-state .big{ font-size:18px; color:var(--text-main); margin-bottom:8px; }

  .jump-row{ display:flex; align-items:center; gap:8px; padding:0 16px 4px; flex-wrap:wrap; }

  .grid-overlay{
    position:fixed; inset:0;
    background:rgba(4,16,28,0.72);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:100;
  }
  .grid-overlay.hidden{ display:none; }
  .grid-panel{
    width:100%; max-width:480px;
    background:var(--bg-panel);
    border-top:1px solid var(--border-soft);
    border-radius:14px 14px 0 0;
    max-height:75vh;
    display:flex; flex-direction:column;
  }
  .grid-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 18px; border-bottom:1px solid var(--border-soft);
    font-size:17px; font-weight:700;
  }
  .grid-header button{
    background:rgba(255,255,255,0.08); border:1px solid var(--border-soft);
    color:var(--text-main); border-radius:50%; width:34px; height:34px; font-size:16px; cursor:pointer;
  }
  .grid-legend{ display:flex; gap:14px; padding:12px 18px 0; font-size:13px; color:var(--text-dim); flex-wrap:wrap; }
  .grid-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot.cur{ background:var(--amber); }
  .dot.star{ background:var(--cyan); }
  .dot.weak{ background:var(--red); }
  .grid-body{
    padding:16px 18px 22px;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:10px;
    overflow-y:auto;
  }
  .grid-item{
    position:relative;
    padding:13px 0;
    text-align:center;
    border-radius:9px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.18);
    color:var(--text-main);
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .grid-item.current{ background:var(--amber); border-color:var(--amber); color:#1A2E3F; }
  .grid-item.weak{ border-color:var(--red); color:var(--red); }
  .grid-item.star::after{
    content:"★"; position:absolute; top:-6px; right:-4px; font-size:10px; color:var(--cyan);
  }
  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--bg-card); border:1px solid var(--amber); color:var(--amber);
    padding:10px 18px; border-radius:20px; font-size:14px; opacity:0; pointer-events:none;
    transition:opacity .25s;
    z-index:50;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="titleblock">
    <div class="tb-row1">
      <div>
        <div class="tb-name">案例300问</div>
        <div class="tb-sub mono">一级建造师 · 实务案例速记</div>
      </div>
      <div class="tb-count mono" id="counter">1/100</div>
    </div>
    <div class="progressbar"><div id="progressFill"></div></div>
  </div>

  <div class="controls">
    <button class="pill active" data-mode="single" id="modeSingle">逐题模式</button>
    <button class="pill" data-mode="batch" id="modeBatch">整体模式</button>
    <span style="flex:1"></span>
    <button class="pill" data-filter="all" id="filterAll">全部</button>
    <button class="pill" data-filter="weak">薄弱</button>
    <button class="pill" data-filter="star">收藏</button>
  </div>

  <div class="jump-row">
    <button class="pill" id="gridBtn">🔢 题号导航</button>
    <span style="flex:1"></span>
    <button class="pill" id="revealAllBtn">整体模式：显示全部答案</button>
  </div>

  <div class="grid-overlay hidden" id="gridOverlay">
    <div class="grid-panel">
      <div class="grid-header">
        <span>选择题号跳转</span>
        <button id="closeGrid">✕</button>
      </div>
      <div class="grid-legend">
        <span><i class="dot cur"></i>当前</span>
        <span><i class="dot star"></i>收藏</span>
        <span><i class="dot weak"></i>薄弱</span>
      </div>
      <div class="grid-body" id="gridBody"></div>
    </div>
  </div>

  <div class="main" id="main"></div>

  <div class="bottomnav">
    <button class="navbtn icon" id="prevBtn">‹</button>
    <button class="navbtn" id="shuffleBtn">随机一题</button>
    <button class="navbtn primary" id="nextBtn">下一题 ›</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
(function(){

// ---------- Data ----------
// 每批截图识别后追加到这个数组即可扩充题库
const QUESTIONS = [
  {id:1, q:"变形监测点的布设要求", a:"便于观察、易于保护、标志稳固", page:"P73", tip:""},
  {id:2, q:"型钢水泥土搅拌墙施工顺序有哪些", a:"单侧挤压、先行钻孔套打、跳打", page:"P79", tip:"单侧先跳"},
  {id:3, q:"基坑施工时，巡视检查的内容", a:"周边环境、支护结构、施工状况、监测设施、其他", page:"P81", tip:"周知识设他"},
  {id:4, q:"基坑施工时，巡视检查的方法", a:"目测、锤、钎、量尺、放大镜、摄影、摄像", page:"P81", tip:"看锤钎尺放影像"},
  {id:5, q:"截水帷幕常用的施工形式", a:"小齿口钢板桩、地下连续墙、高压喷射注浆、深层水泥土搅拌桩", page:"P83", tip:"小弟高深"},
  {id:6, q:"土石方施工前应考虑的因素", a:"运距、土方量、施工顺序、地质条件", page:"P83", tip:"运量师弟"},
  {id:7, q:"土方开挖的原则", a:"开槽支撑、先撑后挖、分层开挖、严禁超挖", page:"P83", tip:"开心分盐"},
  {id:8, q:"深基坑开挖方法", a:"中心岛式、逆作法、放坡、盆式", page:"P84", tip:"中心里放盆"},
  {id:9, q:"哪些土料不得作为回填土", a:"淤泥、淤泥质土、有机质大于5%、含水量不符合要求", page:"P85", tip:"淤泥无水"},
  {id:10, q:"土方压实机具有哪些", a:"平碾、振动压实机、人工打夯、柴油打夯机", page:"P85", tip:"碾压人才"},
  {id:11, q:"验槽具备的资料和条件", a:"①轻型动力触探；\n②岩土工程勘察报告；\n③地基基础设计文件；\n④深基础施工质量检测报告；\n⑤基底应为无扰动的原状土，有保护层时其厚度不应超过100mm；\n⑥勘察、设计、建设、监理、施工相关技术人员到场", page:"P86", tip:"轻岩地质无土人"},
  {id:12, q:"换填强夯复合地基验槽应检查的内容", a:"换填强夯：承载力、均匀性、密实度", page:"P86", tip:"宰军迷"},
  {id:13, q:"增强体复合地基验槽应检查的内容", a:"施工质量检测报告、桩间土情况、桩头、桩位", page:"P86", tip:"捡土投喂"},
  {id:14, q:"轻型动力触探检查的内容及排列方式", a:"①地基持力层的强度和均匀性；\n②浅埋软弱下卧层或浅埋突出硬层；\n③古井、窟穴和空洞", page:"P87", tip:"强均弱埋古墓空"},
  {id:15, q:"轻型动力触探检查的排列方式", a:"中心一排、两排错开、梅花型", page:"P87", tip:""},
  {id:16, q:"静力压桩施工工序", a:"静压沉桩→接桩→再静压沉桩→送桩→终止压桩→检查验收→转移桩机", page:"P90", tip:"陈姐在送终查砖"},
  {id:17, q:"压桩设备选择的依据", a:"最大压桩阻力、桩端持力层土层情况、单桩竖向极限承载力、截面尺寸、穿越土层情况", page:"P90", tip:"主持宰寸土"},
  {id:18, q:"静力压桩接桩方法", a:"咭合式、卡扣式、抱箍式、螺纹式、焊接法", page:"P90", tip:"裂开抱罗汉"},
  {id:19, q:"静力压桩的沉桩施工原则", a:"先大后小、先长后短、先深后浅、避免密集", page:"P91", tip:"大小长短密深浅"},
  {id:20, q:"泥浆护壁灌注桩桩基设备", a:"正(反)循环钻机、冲击钻机、旋挖钻机、多支盘灌注桩机、扩底机械钻具", page:"P91", tip:"正反冲旋多扩底"},
  {id:21, q:"泥浆护壁灌注桩工艺流程", a:"清孔换浆→终孔验收→下钢筋笼和钢导管→二次清孔→清孔质量检验→浇筑水下混凝土→成桩", page:"P91", tip:"清终钢钢 二清质量"},
  {id:22, q:"多支盘灌注桩成孔方法", a:"泥浆护壁成孔、干作业成孔、水泥注浆护壁成孔、重锤捣扩成孔", page:"P91", tip:"泥浆重干注浆"},
  {id:23, q:"泥浆护壁清孔方法", a:"正循环清孔、泵吸反循环清孔、气举反循环清孔", page:"P91", tip:"正反气反"},
  {id:24, q:"泥浆护壁桩底终止注浆控制因素及条件", a:"注浆量与注浆压力两个因素，以前者为主。\n满足下列条件之一即可终止注浆：\na.注浆总量达到设计要求；\nb.注浆量不低于80%,且压力大于设计值", page:"P92", tip:""},
  {id:25, q:"桩基验收受检桩选择条件", a:"①施工质量有疑问的桩；\n②局部地基条件出现异常的桩；\n③承载力验收时选择部分Ⅲ类桩；\n④设计方认为重要的桩；\n⑤施工工艺不同的桩；\n⑥宜按规定均匀和随机选择", page:"P93", tip:"三姨从不随机"},
  {id:26, q:"后浇带和施工缝侧模宜选择的材料有哪些?", a:"小木板、快易收口网、钢板网、铁丝网", page:"P94", tip:"小木板收铁丝"},
  {id:27, q:"混凝土浇筑区域（顺序）划分依据", a:"混凝土供应能力、形状尺寸、场内外条件、浇筑设备", page:"P95", tip:"宫刑内设"},
  {id:28, q:"大体积混凝土运输过程中应采取的措施", a:"防晒、防雨、保温", page:"P96", tip:""},
  {id:29, q:"大体积混凝土浇筑过程中突遇大雨大雪天气处理措施", a:"①在合理位置留置施工缝；\n②中止浇筑；\n③覆盖未硬化混凝土", page:"P96", tip:""},
  {id:30, q:"大体积施工浇筑方法有哪些?", a:"整体分层、推移式、跳仓法", page:"P96", tip:"整体推跳"},
  {id:31, q:"大体积施工缝留置位置应考虑的因素", a:"混凝土供应能力、设计规定、温度裂缝控制规定、钢筋工程施工、预埋管件安装", page:"P96", tip:"混凝土射裂钢管"},
  {id:32, q:"大体积混凝土的测温频率有哪些要求?", a:"里表温差、降温速率、环境温度，每昼夜不应少于4次；\n入模温度测量，每台班不应少于2次", page:"P96", tip:""},
  {id:33, q:"模板设计的原则是?", a:"安全性、实用性、经济性", page:"P98", tip:"按实际"},
  {id:34, q:"钢筋常用的焊接方法", a:"电阻点焊、闪光对焊、气压焊、电渣压力焊、电弧焊、埋弧压力焊", page:"P100", tip:"组队去炸胡"},
  {id:35, q:"钢筋加工包括的内容?", a:"调直、除锈、下料切断、接长、弯曲成型", page:"P100", tip:"调出断肠曲"},
  {id:36, q:"钢筋加工的工具有哪些?", a:"钢筋调直机、机械除锈机、钢筋切断机、手动液压切断器、钢筋弯曲机、四头弯筋机、手工弯曲工具", page:"P100", tip:"钢钢四手手机"},
  {id:37, q:"钢筋除锈的方法", a:"喷砂除锈、机械除锈机除锈、手工除锈、酸洗除锈、冷拉调直除锈", page:"P100", tip:"杀鸡手酸啦"},
  {id:38, q:"主梁、次梁、板交叉处的钢筋布置要求", a:"板的钢筋在上、次梁钢筋居中、主梁钢筋在下", page:"P101", tip:""},
  {id:39, q:"混凝土浇筑过程中，应观察哪些情况", a:"钢筋、模板、支架、预埋件、预留孔洞", page:"P103", tip:""},
  {id:40, q:"混凝土后浇带（施工缝）施工技术措施", a:"①凿毛，清理松动石子、软弱混凝土；\n②冲洗干净；\n③铺一层30mm厚的成分相同水泥浆；\n④填充后浇带，微膨胀混凝土或强度提高一级混凝土进行浇筑并至少养护14天", page:"P103", tip:"1清2洗3坐浆4提高"},
  {id:41, q:"混凝土养护方式及依据", a:"方式：洒水、覆盖、喷涂养护剂；\n依据：技术要求、施工操作、湿度温度、现场条件、构件特点", page:"P104", tip:"技师是条狗"},
  {id:42, q:"砌体砌筑方法", a:"挤浆法、刮浆法、满口灰法、三一砌筑法", page:"P107", tip:"脐(橙)挂满山"},
  {id:43, q:"砖墙常用的砌筑形式有哪些", a:"一顺一丁、三顺一丁、梅花丁", page:"P107", tip:"一顺三顺丁梅花"},
  {id:44, q:"钢结构构件连接方法", a:"焊接、普通螺栓、高强度螺栓、铆接", page:"P109", tip:"高罗汉帽"},
  {id:45, q:"钢结构焊接接头", a:"全熔透和部分熔透焊接、角焊缝接头、塞焊、槽焊、电渣焊、栓钉焊", page:"P110", tip:"全部角色早点定"},
  {id:46, q:"长焊缝宜采用的焊接方法", a:"跳焊法、多人对称焊接法、分段退焊法", page:"P110", tip:"多条粉丝"},
  {id:47, q:"钢结构摩擦面的质量缺陷", a:"毛刺、飞边、飞溅物、氧化铁皮、污垢、焊疤", page:"P110", tip:"毛飞飞养狗吧"},
  {id:48, q:"高强度螺栓施拧方法和顺序", a:"方法：扭矩法、转角法；\n顺序：刚度较大的向刚度较小的，中央向四周，先螺栓后焊接(和焊接并用时)", page:"P111", tip:""},
  {id:49, q:"钢结构焊接的方法", a:"手工焊接、自动化焊接、半自动焊接", page:"P111", tip:""},
  {id:50, q:"钢结构组装的方法", a:"仿形复制装配法、专用设备装配法、胎膜装配法", page:"P111", tip:"复制色魔"},
  {id:51, q:"钢结构堆场的基本条件", a:"场地平整；堆场的面积满足工程进度需要；满足运输车辆通行要求；有电源、水源，排水通畅。\n若现场不能满足要求时可设置中转场地，并应采取防止构件变形及表面污染的保护措施", page:"P112", tip:"平面变形通水电"},
  {id:52, q:"钢结构起重设备有哪些及选择依据", a:"设备：塔式起重机、履带吊、汽车吊、卷扬机、液压油缸千斤顶、吊装扒杆、龙门吊机；\n依据：现场环境、作业效率、起重设备性能、结构特点", page:"P112", tip:"静坐射姐"},
  {id:53, q:"钢结构安装前验收内容", a:"地脚螺栓位置、基础标高和轴线、建筑物的定位轴线", page:"P112", tip:"螺栓标高两轴线"},
  {id:54, q:"钢结构基础工程分批交接时的要求", a:"①基础周围回填夯实应完毕；\n②基础混凝土强度应达到设计要求；\n③基础的轴线标志和标高基准点应准确、齐全", page:"P112", tip:"回填强度标轴线"},
  {id:55, q:"大跨度钢结构安装方法", a:"分条分块吊装法、高空散装法、高空悬拼安装法、整体提升法、整体吊装法、折叠展开式整体提升法、滑移法", page:"P113", tip:"1分2高3整体"},
  {id:56, q:"钢结构吊装滑移法的适用场景有哪些", a:"跨越施工、场地狭窄、起重运输不便", page:"P113", tip:""},
  {id:57, q:"压型金属钢板端部锚固和开孔的方法", a:"端部锚固：点焊、贴角焊、射钉连接；\n开孔：等离子切割、空心钻开孔", page:"P114", tip:""},
  {id:58, q:"钢结构油漆防腐涂装方法", a:"涂刷法、手工滚涂法、高压无气喷涂法、空气喷涂法", page:"P114", tip:"涂手爬高空"},
  {id:59, q:"墙体节能保温系统类型", a:"外墙外保温、外墙内保温、夹芯层墙体、自保温混凝土复合块墙体", page:"P127", tip:"自内外夹芯"},
  {id:60, q:"防水混凝土采用机械振捣时的注意事项", a:"避免漏振、欠振、超振", page:"P130", tip:""},
  {id:61, q:"轻质隔墙作业条件要求", a:"①室内弹出+500mm标高线；\n②室内地面、抹灰及屋面防水已完成；\n③主体结构完成及交接验收合格；\n④地枕带施工完成；\n⑤各种系统管线盒弹线完成；\n⑥幕墙门窗安装到位", page:"P135", tip:"屋内主诊弹门窗"},
  {id:62, q:"饰面板和胶合板的质量缺陷", a:"饰面板：色差、起皮、裂纹、污垢、翘曲、缺角；\n胶合板：脱胶、变色、腐朽", page:"P135", tip:"色皮猎狗翘脚"},
  {id:63, q:"饰面板复验的内容有哪些", a:"①外墙陶瓷板的吸水率；\n②严寒和寒冷地区外墙陶瓷板的抗冻性；\n③水泥基粘结料的粘结强度；\n④人造木板的甲醛释放量、花岗石板的放射性", page:"P144", tip:"水冻陶瓷粘木花"},
  {id:64, q:"幕墙施工前复测的内容及后置埋件验收要点", a:"复测内容：各层标高、轴线位置、垂直度、构件的局部偏差和凹凸程度；预埋件的位置偏差及漏埋情况\n验收要点：锚板和锚栓的材质、锚栓埋置深度及拉拔力", page:"P146", tip:"高位垂偏预埋件"},
  {id:65, q:"绿色施工技术有哪些", a:"施工现场水收集综合利用技术、施工扬尘控制技术、施工现场太阳能及空气能利用技术、建筑垃圾减量化与资源化利用技术、施工噪声控制技术、工具式定型化临时设施技术、垃圾管道垂直运输技术", page:"P148", tip:"水扬太空，减生化垃圾"},
  {id:66, q:"施工扬尘控制技术有哪些", a:"车辆自动冲洗技术、自动喷淋降尘、雾炮降尘技术", page:"P149", tip:"车辆喷雾"},
  {id:67, q:"施工噪声控制技术", a:"先进施工工艺、低噪声设备、隔声屏、隔声罩", page:"P149", tip:"先设屏罩"},
  {id:68, q:"工具式定型化临时设施有哪些", a:"标准化箱式房、可重复使用临时道路板、定型化临边洞口防护、构件化PVC绿色围墙、预制装配式马道、加工棚", page:"P150", tip:"箱间路边围马棚"},
  {id:69, q:"垃圾运输管道的组成", a:"楼层垃圾入口、主管道、减速门、垃圾出口、专用垃圾箱、管道与结构连接件等主要构件组成", page:"P150", tip:"楼主专道捡垃圾"},
  {id:70, q:"智慧工地信息技术有哪些", a:"劳务工人信息管理、项目物资全过程监管、项目机械设备协同管理、现场环境监管、项目成本分析与控制、现场施工管理、电子商务采购", page:"P151", tip:"劳资设环境 成本管采购"},
  {id:71, q:"采用定位技术时，可以将芯片植入哪些穿戴设备中", a:"工作牌、施工安全背心、安全帽", page:"P151", tip:""},
  {id:72, q:"施工许可证申领条件", a:"①有满足施工需要的资金安排、施工图纸及技术资料；\n②已经办理该建筑工程用地批准手续；\n③已经确定有效的施工企业；\n④已经取得建设工程规划许可证；\n⑤已经基本具备施工条件；\n⑥有保证工程质量和安全的具体措施", page:"P161", tip:"有钱有证有企业，规划条件和措施"},
  {id:73, q:"总包保证质量和安全的具体措施有?", a:"①施组中有相应质量、安全技术措施。\n②建立工程质量安全责任制并落实到人。\n③专业性较强的项目编制了专项质量、安全施工组织设计。\n④办理了工程质量、安全监督手续", page:"P161", tip:"施组落实有手续"},
  {id:74, q:"工程总承包项目经理具备条件", a:"①取得工程建设类注册执业资格；\n②担任类似项目负责人；\n③熟悉相关法律法规和管理知识；\n④有组织协调能力和良好的职业道德", page:"P162", tip:"有证有经验，懂法懂管理，还有职业道德"},
  {id:75, q:"脚手架搭设和拆除时的要求", a:"设置安全警戒线、警戒标志、专人监护、严禁非作业人员入内", page:"P163", tip:""},
  {id:76, q:"脚手架验收内容", a:"①架体搭设质量；\n②材料与构配件质量；\n③搭设场地、支承结构件的固定；\n④专项施工方案、产品合格证、使用说明及检测报告、检查记录、测试记录等技术资料", page:"P164", tip:"架体材料支场地，测查方案和说明"},
  {id:77, q:"应判定为重大事故隐患的基坑工程情形有?", a:"①基坑土方超挖且未采取有效措施；\n②出现基坑坍塌风险预兆且未及时处理；\n③对因基坑工程施工可能造成损害的毗邻重要建筑物、构筑物和地下管线等，未采取专项防护措施；\n④深基坑施工未进行第三方监测", page:"P165", tip:"超挖坍塌防小三"},
  {id:78, q:"应判定为重大事故隐患的模板工程情形?", a:"①地基基础承载力和变形不满足设计要求；\n②施工荷载超过设计值；\n③模板支架拆除及滑模、爬模爬升时，混凝土强度未达到设计或规范要求", page:"P165", tip:"机载强"},
  {id:79, q:"应判定为重大事故隐患的脚手架工程情形有?", a:"①地基基础承载力和变形不满足设计要求；\n②未设置连墙件或连墙件整层缺失；\n③附着式升降脚手架的防倾覆、防坠落或同步升降控制装置不符合要求、失效", page:"P165", tip:"基件亲嘴同失效"},
  {id:80, q:"应判定为重大事故隐患的起重机械及吊装情形有?", a:"①起重机械设备未经验收合格即投入使用，或未按规定办理使用登记；\n②塔式起重机独立起升高度、附着间距和最高附着以上的最大悬高及垂直度不符合规范要求；\n③施工升降机附着间距和最高附着以上的最大悬高及垂直度不符合规范要求", page:"P165", tip:"塔升高垂没验收"},
  {id:81, q:"应判定为重大事故隐患的临时用电情形有?", a:"高温、湿度长期超过75%、积水、泥泞、通风不畅、导电灰尘、照明未按规定使用安全电压", page:"P165", tip:"温湿水泥通导电"},
  {id:82, q:"危大工程施工方案内容", a:"工程概况、管理及作业人员配备和分工、施工图纸及计算书、工艺技术、安全保证措施、施工计划、验收要求、编制依据、应急处置措施", page:"P167", tip:"工程人员图艺措，安全计划要验收"},
  {id:83, q:"危大工程监测方案内容", a:"监测内容、监测依据、测点布置与保护、监测频次、人员及设备、监测方法、工程概况、预警标准及监测成果报送", page:"P168", tip:""},
  {id:84, q:"专家论证的主要内容有", a:"①专项方案内容是否完整、可行。\n②专项方案计算书和验算依据、施工图是否符合有关标准规范。\n③专项施工方案是否满足现场实际情况，并能够确保施工安全", page:"P168", tip:""},
  {id:85, q:"专家论证的结论", a:"通过、修改后通过、不通过，对论证报告负责并签字确认", page:"P168", tip:""},
  {id:86, q:"建筑垃圾减量化原则", a:"估算先行、源头减量、分类管理、就地处置、排放控制", page:"P168", tip:"估算缘分，就地排放"},
  {id:87, q:"源头减量的内容有哪些?", a:"深化设计、工艺要求、现场管理", page:"P170", tip:"现场深化工艺"},
  {id:88, q:"宜采用重复率高的标准化设施有哪些", a:"办公用房、宿舍、停车场地、工地围挡、大门、工具棚、安全防护栏杆", page:"P171", tip:"栏棚停车，围攻射大门"},
  {id:89, q:"废旧模板的作用", a:"用于制作花坛、雨水箅子、楼梯踏步板、覆膜、消防柜", page:"P171", tip:"花臂不富贵"},
  {id:90, q:"工程渣土的改良方法", a:"清理、筛分、翻晒、拌合石灰或水泥", page:"P171", tip:"青菜拌饭"},
  {id:91, q:"对哪些产品实施生产许可管理?", a:"冷轧带肋钢筋、钢丝绳、胶合板、细木工板、安全帽", page:"P170", tip:""},
  {id:92, q:"哪些区域不得使用人工挖孔桩", a:"①地下水丰富、软弱土层、流沙等不良地质条件的区域；\n②孔内空气污染物超标准；\n③机械成孔设备可以到达的区域", page:"P172", tip:"水土流沙染机械"},
  {id:93, q:"竣工验收时采光测量项目", a:"反射比、颜色透射指数、采光系数、采光均匀度", page:"P176", tip:""},
  {id:94, q:"质量管理标准化文件的内容有哪些?", a:"技术、施工、人员、材料、分包、验收、资料管理", page:"P177", tip:""},
  {id:95, q:"质量策划的内容有哪些", a:"质量风险、质量管理与协调的程序、质量控制点、实现目标的控制措施、质量目标和要求、管理体系及职责", page:"P178", tip:"风险程序两控制"},
  {id:96, q:"质量交底的内容有哪些", a:"安全与环保措施、技术措施、质量标准、作业条件、施工方法", page:"P178", tip:""},
  {id:97, q:"检验批、分部分项划分条件", a:"①检验批应根据施工组织、质量控制和专业验收需要，按工程量、施工段、楼层划分。\n②分项工程应根据施工工艺、工种、材料、设备类别划分。\n③分部工程应根据专业性质、工程部位划分", page:"P179", tip:""},
  {id:98, q:"室内污染物检测布点方式", a:"对角线、斜线、梅花状均衡布点", page:"P184", tip:""},
  {id:99, q:"工程防水遵循的原则", a:"因地制宜、以防为主、防排结合、综合治理", page:"P186", tip:""},
  {id:100, q:"灰土地基施工质量检测方法", a:"轻型动力触探、静力触探、贯入仪、环刀法、标准贯入试验", page:"P188", tip:"动静入刀"},
  {id:101, q:"砂石地基施工质量检测方法", a:"载荷法、现场直接剪切试验、贯入法、环刀法", page:"P188", tip:"宰切入刀"},
  {id:102, q:"砂石地基施工前确定的参数", a:"分层厚度、施工方法、振捣器功率、振捣遍数", page:"P188", tip:"度法七遍"},
  {id:103, q:"粉煤灰地基施工过程中检验内容", a:"搭接区碾压程度、碾压遍数、压实系数、铺筑厚度、施工含水量", page:"P188", tip:"去三亚度水"},
  {id:104, q:"强夯地基夯点施打原则", a:"由内而外、隔行跳打", page:"P188", tip:""},
  {id:105, q:"喷射注浆地基遇到周边环境有保护要求时，可以采取哪些措施", a:"放慢施工速度、速凝浆液、冒浆回灌、隔孔喷射", page:"P189", tip:"慢速帽孔"},
  {id:106, q:"灰土挤密桩地基施工方法", a:"沉管法、冲击法、钻孔法", page:"P189", tip:""},
  {id:107, q:"CFG复合地基施工质量检查内容", a:"混合料坍落度、褥垫层厚度、桩数、桩位偏差、桩体试块抗压强度、夯填度、施工记录", page:"P189", tip:"落入山庄填记录"},
  {id:108, q:"基坑支护结构选型考虑的因素", a:"施工工艺的可行性、场地条件、基坑深度、地下水条件、土的性状", page:"P190", tip:"工艺条件坑水土"},
  {id:109, q:"地下连续墙的接头方式", a:"柔性：圆形锁口管、波纹管、契型、工字形、混凝土预制\n刚性：穿孔钢板、钢筋承插式", page:"P190", tip:"圆波砌公寓"},
  {id:110, q:"土钉墙的成孔方法", a:"洛阳铲、螺旋钻、冲击钻、地质钻", page:"P189", tip:"罗螺冲地"},
  {id:111, q:"砌体质量控制等级的划分要素", a:"砂浆拌合工艺、砌筑工人技术、质量控制、管理水平", page:"P194", tip:"艺人控水平"},
  {id:112, q:"钢结构承重构件应具有哪些合格保证", a:"抗拉强度、屈服强度、断后伸长率、磷硫含量、冲击韧性", page:"P195", tip:"强屈断PS"},
  {id:113, q:"钢结构设计时，焊缝质量等级划分依据", a:"荷载特性、重要性、应力状态、工作环境、焊缝形式", page:"P196", tip:"河中应环形"},
  {id:114, q:"外围护系统隐蔽项目的验收内容", a:"①预埋件；\n②与主体结构的连接节点；\n③与主体结构之间的封堵构造节点；\n④变形缝及墙面转角处的构造节点；\n⑤防雷装置；\n⑥防火构造", page:"P197", tip:"街角封火埋雷"},
  {id:115, q:"外围护系统应进行的现场试验和测试有哪些", a:"饰面砖的粘接强度、淋水试验、传热系数、隔声", page:"P198", tip:"沾水热身"},
  {id:116, q:"外围护系统竣工前完成的试验和测试有哪些", a:"层间变形性能、耐火极限、耐撞击性能、连接件材性、锚栓拉拔强度、抗压性能", page:"P198", tip:"变火鸡才拔牙"},
  {id:117, q:"装饰装修工程质量验收规定有哪些?", a:"①装修施工过程中的抽样检验结果，包括隐蔽工程的施工过程中和完工后的抽样检验结果应符合设计要求；\n②现场进行阻燃处理、喷涂、安装作业的抽样检验结果应符合设计要求；\n③所用装修材料或产品的见证取样检验结果，应满足设计要求；\n④技术资料应完整；\n⑤施工过程中的主控项目检验结果应全部合格；\n⑥施工过程中的一般项目检验结果合格率应达到80%", page:"P203", tip:"抽取资料控80"},
  {id:118, q:"建筑节能验收合格规定?", a:"①外墙节能构造现场实体检验符合要求；\n②建筑外窗气密性能现场实体检验符合要求；\n③建筑节能各分项工程应全部合格；\n④质量控制资料应完整；\n⑤建筑设备系统节能性能检测结果应合格；\n⑥太阳能系统性能检测结果应合格", page:"P205,P301", tip:"实体分子射太阳"},
  {id:119, q:"门窗节能核查和复验内容", a:"核查：标识证书、质量证明文件、复验报告、计算书\n复查：太阳得热系数、传热系数、气密性能、透射反射比、密封性能", page:"P205", tip:"太热去射B"},
  {id:120, q:"保温锚固件的要求", a:"胶结材料性能、位置、锚固件数量、锚固深度、和锚固力应符合设计和施工方案的要求", page:"P205", tip:"材料位置三锚固"},
  {id:121, q:"节能工程复验内容", a:"①保温隔热材料的密度、导热系数、吸水率、燃烧性能、抗压强度；\n②复合保温板的燃烧性能、传热系数、拉伸粘结强度、单位面积质量；\n③保温砌块的传热系数、抗压强度及吸水率；\n④墙体及屋面反射隔热材料的太阳光反射比及半球发射率；\n⑤墙体粘结材料的拉伸粘结强度；\n⑥墙体抹面材料的拉伸粘结强度及压折比；\n⑦墙体增强网的力学性能及抗腐蚀性能", page:"P206", tip:"密道水烧鸭，烧热拉面，力学拉伸两射比"},
  {id:122, q:"保温浆料检测内容", a:"导热系数、干密度、抗压强度", page:"P206", tip:""},
  {id:123, q:"屋面节能隐蔽验收的部位", a:"①基层及其表面处理；\n②保温材料的种类、厚度、保温层的敷设方法；板材缝隙填充质量；\n③屋面热桥部位处理；\n④隔汽层", page:"P207", tip:"基材热汽"},
  {id:124, q:"地面节能隐蔽验收部位", a:"①基层及其表面处理；\n②保温材料种类和厚度；\n③保温材料粘结；\n④地面热桥部位处理", page:"P207", tip:"基材热粘"},
  {id:125, q:"绿色建造评价体系", a:"安全耐久、资源节约、健康舒适、生活便利、环境宜居", page:"P208", tip:"安（甘）资是便宜"},
  {id:126, q:"生活便利的评分项", a:"出行与无障碍、服务设施、智慧运行、运营管理", page:"P209", tip:""},
  {id:127, q:"健康舒适的评分项", a:"室内空气品质、水质、声环境与光环境、室内热湿环境", page:"P209", tip:"水汽声光热"},
  {id:128, q:"绿色建造数字化交付的内容", a:"职责权限、图纸、环境信息、模型、交付计划、数据要求、工程量清单", page:"P212", tip:"全图环模计数量"},
  {id:129, q:"建立项目部遵循的步骤", a:"①明确管理任务；\n②明确组织结构；\n③确定岗位职责、权限及人员配置；\n④制定工作程序和管理制度；\n⑤由组织管理层审核认定", page:"P216", tip:"任务组织人工核定"},
  {id:130, q:"管理绩效评价的范围和内容", a:"方法与创新、效果验证、分析与策划、基本情况", page:"P218", tip:"方正分析情况"},
  {id:131, q:"管理绩效评价的内容", a:"模式理念、特点、主要管理对策调整改价、相关方满意度、过程检查考核评价、实施成果", page:"P218", tip:"模特主管满苹果"},
  {id:132, q:"发生哪些情况时，施组应及时修改", a:"工程设计、法律法规、施工环境、施工方法、资源配置有重大变化", page:"P219", tip:"设法换房子"},
  {id:133, q:"施工组织总设计的内容", a:"主要施工方法、工程概况、总体施工部署、施工总进度计划、施工总平面布置、主要资源配置计划", page:"P219", tip:"法概不进平原"},
  {id:134, q:"总体施工部署包括哪些方面", a:"①确定项目施工总目标（进度、质量、安全、环境、绿色施工、成本）；\n②根据总目标，确定项目分阶段(期)交付计划；\n③明确项目分阶段(期)施工的合理顺序及空间组织；\n④总体施工部署中还应对项目施工的重点和难点进行简要分析；\n⑤对于施工中开发和使用的新技术、新工艺要做出明确部署；\n⑥对主要分包施工单位的资质和能力提出明确要求", page:"P219", tip:"总分顺序重新资"},
  {id:135, q:"总体施工准备的内容", a:"技术准备、现场准备、资金准备", page:"P220", tip:""},
  {id:136, q:"模板支撑方案的计算书和相关图纸的内容", a:"计算书：基础承载力变形、支撑架构配件的力学特性及几何参数，各种荷载的强度、刚度及稳定性。\n图纸：监测平面布置图、梁模板支撑节点、结构拉结点、平面图、立面图、剖面图", page:"P223", tip:"基础配件强刚稳，监测节点平立剖"},
  {id:137, q:"危大工程，施工单位公告的内容及验收要求有哪些", a:"公告：在显著位置公告危大工程名称、施工时间和具体责任人员，并在危险区域设置安全警示标志。\n验收：在明显位置设置验收标识牌，公示验收时间和责任人员", page:"P224", tip:""},
  {id:138, q:"危大工程哪些资料应纳入档案管理", a:"方案及审核、专家论证、交底、现场检查、验收及整改", page:"P224", tip:""},
  {id:139, q:"施工总平图设计要点有哪些?", a:"①设置大门，引入场外道路；\n②布置大型机械设备；\n③布置仓库、堆场；\n④布置加工厂；\n⑤布置场内临时运输道路；\n⑥布置临时房屋；\n⑦布置临时水电管网和其他动力设施", page:"P225", tip:"机场厂门运防水"},
  {id:140, q:"大门应考虑的因素有哪些?", a:"周边路网情况、转弯半径、大门的高度和宽度、坡度限制", page:"P224", tip:"周转高宽坡"},
  {id:141, q:"群塔布置应考虑的因素有哪些", a:"相互位置、高度、覆盖范围、防碰撞措施", page:"P224", tip:""},
  {id:142, q:"布置加工厂的指导思想是?", a:"①材料和构件的运输量最小；\n②垂直运输设备发挥较大的作用；\n③工作有关联的加工厂适当集中", page:"P225", tip:"小材料，大设备，厂集中"},
  {id:143, q:"施工平面图绘制依据及内容是什么?", a:"依据：绘图规则、比例、规定代号和规定线条；\n内容：图名、图例、比例尺、方向标记、必要的文字说明", page:"P225", tip:"土逼带线，图图要吃饭"},
  {id:144, q:"施工平面管理的目的是?", a:"使场容美观、整洁，道路畅通，材料放置有序，施工有条不紊，安全文明，相关方都满意，管理方便、有序", page:"P223", tip:"道场全都施管材"},
  {id:145, q:"围挡的搭设要求", a:"牢固、稳定、整洁、美观", page:"P226", tip:""},
  {id:146, q:"现场出入口管理规定", a:"①应标示企业名称、五牌一图；\n②大门应设置门卫和实名制管理措施；\n③人、车出入口分开；\n④应设置车辆冲洗设施", page:"P226", tip:"企业门卫实名制，人车分流要洗车"},
  {id:147, q:"工程施工造成的环境影响有哪些?", a:"大气污染、室内空气污染、水污染、土壤污染、噪声污染、光污染、垃圾污染", page:"P226", tip:"水土声光垃气气"},
  {id:148, q:"埋地电缆在穿越哪些部位时应加设套管?", a:"易受机械损伤、介质腐蚀场所、建筑物、构筑物、道路", page:"P227", tip:"机械腐蚀无道路"},
  {id:149, q:"室内配线要求", a:"(1)室内配线必须采用绝缘导线或电缆。\n(2)室内非埋地明敷主干线距地面高度不得小于2.5m。\n(3)室内配线必须有短路保护和过载保护", page:"P227", tip:"绝缘过短高25"},
  {id:150, q:"临电工程定期检查的内容", a:"接地电阻、绝缘电阻、漏保的剩余电流动作参数测定", page:"P227", tip:""},
  {id:151, q:"施工现场临时用电工程必须符合的规定?", a:"采用三级配电系统；采用TN-S接零保护系统；采用二级漏电保护系统", page:"P228", tip:""},
  {id:152, q:"配电箱开关箱定期检查要求", a:"将前一级分闸断电、设置专人监护、悬挂\"禁止合闸，有人工作\"标识牌、不得带电作业", page:"P228", tip:""},
  {id:153, q:"送电停电的操作顺序", a:"送电：总配电箱→分配电箱→开关箱；\n停电：开关箱→分配电箱→总配电箱", page:"P228", tip:"送电总分开"},
  {id:154, q:"供水系统包括的内容", a:"取水位置、取水设施、净水设施、贮水装置、输水管、配水管网、末端配置", page:"P229", tip:"取取净猪输配末"},
  {id:155, q:"供水管网布置原则", a:"利用已有的永久管道、管道铺设越短越好、管径要计算确定、管网移动可能性、管线采用环状布置", page:"P229", tip:"有段（位）算一环"},
  {id:156, q:"确定抽检频次有哪些?", a:"施工流水段、工程量、施工环境、质量控制的需要", page:"P231", tip:"刘工失控"},
  {id:157, q:"检测试验管理制度", a:"检测试验报告、仪器设备、现场试样制取及养护、现场检测试验安全管理、岗位职责", page:"P232", tip:"宝器治安岗"},
  {id:158, q:"检测试验技术管理程序", a:"①制订检测试验计划；\n②制取试样；\n③登记台账；\n④送检；\n⑤检测试验；\n⑥检测试验报告管理", page:"P232", tip:"及时登记送简报"},
  {id:159, q:"试验仪器设备有哪些", a:"混凝土振动台、试模、钢直(卷)尺、天平、台(案)秤、温度计、湿度计、坍落度筒、砂浆稠度仪、环刀", page:"P232", tip:"镇魔尺，天台度稠刀"},
  {id:160, q:"试样唯一性标识的规定有哪些", a:"①试样应按照取样时间顺序连续编号，不得空号、重号；\n②试样标识的内容应根据试样的特性确定，宜包括：名称、规格(或强度等级)、制取日期等信息；\n③试样标识应字迹清晰、附着牢固", page:"P233", tip:"内容连续，字迹清晰"},
  {id:161, q:"试验台账有哪些", a:"钢筋试样台账，钢筋连接接头样台账，混凝土试样台账，砂浆试样台账，其他试样台账", page:"P233", tip:""},
  {id:162, q:"检测试样的要求有哪些", a:"清晰的、不易脱落的、唯一性标识、标志", page:"P233", tip:""},
  {id:163, q:"检测委托单的填写单位及签字人员", a:"填写单位：内容提供单位、送检单位；\n签字人员：送检人员、见证人员", page:"P233", tip:""},
  {id:164, q:"施工总承包投标流程", a:"研究招标文件→参加现场考察与标前会→调查投标环境→项目投标策略研究→投标报价计算与决策→编制、审定投标文件→开具投标保函→递交投标文件、投标", page:"P238", tip:"严查环略算审函"},
  {id:165, q:"工程总承包投标流程", a:"决定投标方案→选定分包商→主要采购计划→勘察与标前会议→编写标书→审定标书→投标保函→呈递标书", page:"P239", tip:"决分采察编审函"},
  {id:166, q:"工程总承包的解释合同文件的优先顺序", a:"①合同协议书；\n②中标通知书(如果有)；\n③投标函及投标函附录(如果有)；\n④专用合同条件及《发包人要求》等附件；\n⑤通用合同条件；\n⑥承包人建议书；\n⑦价格清单；\n⑧双方约定的其他合同文件", page:"P242", tip:"协中投砖通人格"},
  {id:167, q:"工程总承包合同管理工作内容", a:"合同订立、合同备案、合同交底、合同履行、合同变更、争议与诉讼、合同分析与总结", page:"P242", tip:"立案焦虑变争分"},
  {id:168, q:"总包合同管理的原则", a:"①全面履行原则②诚实信用原则③维护权益原则④依法履约原则⑤动态管理原则⑥协调合作原则", page:"P242", tip:"全程唯一动作"},
  {id:169, q:"施工总承包合同文件的解释优先顺序", a:"①合同协议书；\n②中标通知书(如果有)；\n③投标函及其附录(如果有)；\n④专用合同条款及其附件；\n⑤通用合同条款；\n⑥技术标准和要求；\n⑦图纸；\n⑧已标价工程量清单或预算书；\n⑨其他合同文件", page:"P243", tip:"协中投砖通技图"},
  {id:170, q:"合同变更管理程序", a:"①提出合同变更申请。\n②报项目经理审查、批准。必要时，经企业合同管理部门负责人签认，重大的合同变更须报企业负责人签认。\n③经业主签认，形成书面文件。\n④组织实施", page:"P244", tip:"申请审批，签认实施"},
  {id:171, q:"工程发生争议事项时的解决方式", a:"①合同约定；\n②委托争议评审委员会评审；\n③委托具有调解能力的调解人进行调解；\n④仲裁或诉讼", page:"P244", tip:"评审解诉讼"},
  {id:172, q:"合同管理人员收集整理的资料有哪些", a:"报告、图纸、证据资料、函件、信息、记录", page:"P244", tip:"暴徒证据韩信记"},
  {id:173, q:"工程分包合同有哪些", a:"劳务分包、采购分包、设计分包、专业分包、试运行服务、其他咨询服务", page:"P244", tip:"老蔡设专服"},
  {id:174, q:"分包合同中，总承包合同义务有哪些", a:"①向分包人提供施工场地；\n②向分包人进行设计图纸交底；\n③提供合同中约定的设备和设施；\n④提供运输通道；\n⑤协调分包人与其他分包人之间的交叉配合；\n⑥其他工作", page:"P245", tip:"通道交配设地图"},
  {id:175, q:"物资采购合同主要条款", a:"特殊条款、违约责任、数量、包装、标的、运输方式、结算、价格", page:"P246", tip:"特约书包，标运算价"},
  {id:176, q:"物资采购合同标的的内容", a:"品种、型号、规格、花色、等级、技术标准、质量要求", page:"P246", tip:"品型规色等标质"},
  {id:177, q:"设备供应合同签订时的注意事项", a:"验收和保修、技术标准、设备价格、设备数量、现场服务", page:"P247", tip:"保镖家舒服"},
  {id:178, q:"工程计价的原则", a:"客观公正、平等自愿、诚实守信、法定优先、有约从约", page:"P247", tip:"公平守法约"},
  {id:179, q:"由发包人承担的计量计价风险有哪些?", a:"①单价合同，工程量清单缺陷（措施费除外）；\n②发包人提供的项目原始数据和基准资料错误；\n③发包人批准的工程变更；\n④发包人要求的赶工、提前竣工、停工、暂缓施工", page:"P249", tip:""},
  {id:180, q:"由承包人承担的计量计价风险有哪些", a:"①单价合同，完成工程量清单所有工作的费用；\n②总价合同，工程量清单缺陷；\n③措施项目清单的准确性及完整性；\n④自身原因引起的费用增加", page:"P249", tip:""},
  {id:181, q:"工程量清单编制依据", a:"计价标准、计量规则、合同条款、招标图纸、技术标准、现场情况、水文资料、工程特点、交付标准", page:"P250", tip:""},
  {id:182, q:"工程造价的特点", a:"动态性、层次性、大额性、差异性和个别性", page:"P250", tip:"动次打次"},
  {id:183, q:"根据不同的建设阶段，建设工程造价可以分为哪几类", a:"投资估算、概算造价、预算造价、合同价、结算价、决算价", page:"P250", tip:"锅盖预和姐姐"},
  {id:184, q:"按照主要工作阶段，工程造价可以分为哪几类", a:"招标控制价、投标价、签约合同价、竣工结算价", page:"P250", tip:""},
  {id:185, q:"合同价款调整的情况有哪些", a:"①工程量清单缺陷；\n②其他费（暂列金额、暂估价、总承包服务费、计日工）；\n③物价变化、法律法规变化；\n④工程变更、新增工程；\n⑤工程索赔", page:"P253", tip:"清他物法变增赔"},
  {id:186, q:"工程价款的管理内容有哪些", a:"质量保证金、工程预付款、工程进度款、工程结算款、竣工决算、安全生产措施费", page:"P254", tip:"金鱼渡劫决安全"},
  {id:187, q:"工程竣工价款编制顺序", a:"①合同清单总价 ②工程量清单缺陷 ③暂列金额 ④暂估价 ⑤总包服务费 ⑥计日工 ⑦物价变化 ⑧法律法规 ⑨工程变更 ⑩新增工程 ⑪工程索赔 ⑫违约金 ⑬其他", page:"P256", tip:"清他无法变增赔约"},
  {id:188, q:"竣工结算申请的内容有哪些", a:"①竣工结算总额；\n②已支付的合同价款；\n③应扣留的质量保证金；\n④应支付的竣工付款金额", page:"P257", tip:"应付已付总质保"},
  {id:189, q:"竣工结算调整的方法有哪些", a:"工程造价指数调整法、实际价格法、调价系数法、调直公式法", page:"P257", tip:"十指价值"},
  {id:190, q:"导致工程变更发生索赔的因素有哪些", a:"气象、水文、地形、地质、市场、人、政治", page:"P258", tip:"汽水弟弟是人证"},
  {id:191, q:"不适用于工程变更计价的，综合单价确定的依据", a:"工程实施情况、市场价格、清单计价规则、报价水平协商", page:"P259", tip:""},
  {id:192, q:"因发包人原因，但不能索赔利润的情况有哪些", a:"①按发包人或监理人要求对材料和工程进行重新检测但结果质量合格；\n②额外增加的检查、检验、试验直接费用；\n③工程试运行失败", page:"P260", tip:"额外失败重新检"},
  {id:193, q:"索赔报告的内容", a:"费用、证明材料、原因、工期、计算明细表、依据、记录", page:"P261", tip:"废材员工算依据"},
  {id:194, q:"索赔证据的基本要求", a:"及时性、法律效力、真实性、全面性", page:"P261", tip:"时效真全"},
  {id:195, q:"哪些工程文件可以作为索赔证据", a:"监理填写的各种签证、施工备忘录、施工记录、工作日记、施工日报", page:"P261", tip:"监理忘记签记报"},
  {id:196, q:"常见的索赔证据有哪些?", a:"工程照片、来往信件、工程文件、气候报告、会谈纪要、工地交接记录、建筑材料和设备的采购记录等、市场行情资料、会计核算资料、国家法律法令政策文件", page:"P261", tip:"赵信文气要交接"},
  {id:197, q:"索赔计算方法", a:"工期索赔：网络分析法、比例分析法、其他方法；\n费用索赔：总费用法、分项法", page:"P262", tip:""},
  {id:198, q:"因承包人原因，发包人可选择的补偿方式", a:"①延长质量保修期期限；\n②受影响发生的额外费用；\n③误期赔偿费；\n④违约金", page:"P263", tip:"额外保修赔偿金"},
  {id:199, q:"网络计划优化有哪几类", a:"工期优化、资源优化、费用优化", page:"P269", tip:""},
  {id:200, q:"工期优化对象考虑的因素有哪些", a:"①缩短持续时间所需增加的资源、费用最少的工作；\n②缩短持续时间对质量和安全影响不大的工作；\n③有备用资源的工作", page:"P269", tip:"增加治安有备用"},
  {id:201, q:"资源优化的两种模式", a:"\"资源有限、工期最短\"，\"工期固定、资源均衡\"", page:"P269", tip:""},
  {id:202, q:"施工总进度计划表的作用", a:"用来安排各单项工程和单位工程的计划开竣工日期、工期、搭接关系及其实施步骤", page:"P272", tip:"开竣工期接步骤"},
  {id:203, q:"进度事前控制内容", a:"①编制总进度计划，确定总目标；\n②分解总目标，制订细部计划；\n③制订相应施工方案和保障措施。", page:"P273", tip:"总分措施"},
  {id:204, q:"检查工程进度时，审核的内容", a:"计划进度与实际进度的差异，形象进度、实物工程量与工作量指标完成情况的一致性", page:"P273", tip:""},
  {id:205, q:"项目进度报告的内容", a:"实际施工进度;资源供应进度；进度偏差状况及原因;解决问题的措施；计划调整意见", page:"P274", tip:"实资偏差问意见"},
  {id:206, q:"质量计划编制依据", a:"①法律法规和标准规范；\n②合同中有关产品质量要求；\n③项目管理规划大纲；\n④质量管理其他要求。\n⑤项目设计文件；", page:"P275", tip:"法质规他设"},
  {id:207, q:"项目质量计划的内容", a:"①法律法规和标准规范；\n②质量控制点的设置与管理\n③项目生产要素的质量控制；\n④实施质量目标和要求所采取的措施；\n⑤项目质量文件管理。\n⑥质量目标和质量要求；\n⑦管理体系和管理职责；\n⑧质量管理与协调的程序；", page:"P275", tip:"法制是错文"},
  {id:208, q:"质量管理记录的内容", a:"①交底记录；\n②图纸变更设计接收和发放记录；\n③监督检查和整改、复查记录\n④上岗培训记录和岗位资格证明；\n⑤使用机具和检验、测量及试验设备的管理记录\n⑥施工日记和专项施工记录；", page:"P276", tip:"教徒查岗验日记"},
  {id:209, q:"质量检查的内容", a:"①分部分项完成后的检查\n②开工前检查\n③隐蔽工程检查\n④停工后复工检查\n⑤工序交接检查", page:"P276", tip:"分开必停工"},
  {id:210, q:"质量检查的方法", a:"目测、实测、实验法", page:"P276", tip:""},
  {id:211, q:"土方回填施工过程中应检查的内容", a:"含水量控制、回填土有机质含量、碾迹重叠程度、压实系数、每层填筑厚度、排水系统", page:"P277", tip:"水土重压后排"},
  {id:212, q:"砂石地基施工过程中应检查的内容", a:"上下两层的搭接长度、分层铺设厚度、压实系数、夯压遍数、夯实加水量", page:"P277", tip:"搭接后压水"},
  {id:213, q:"强夯地基施工过程中应检查的内容", a:"最后两击的平均夯沉量、总夯沉量、夯击遍数、夯点位置、夯击范围、落距", page:"P277", tip:"量量三夯落距"},
  {id:214, q:"模板施工过程中重点检查内容", a:"垂直度、平整度、支承面积、几何尺寸、强度、刚度、稳定性", page:"P278", tip:"垂平知己强刚稳"},
  {id:215, q:"钢筋施工过程重点检查内容", a:"原材料进场合格证、复试报告、钢筋连接试验报告、加工质量、操作者合格证。", page:"P277", tip:"和府验假钞"},
  {id:216, q:"钢筋分项质量控制的内容", a:"加工、连接、安装、进场检验", page:"P277", tip:"贾连安检"},
  {id:217, q:"钢筋隐蔽验收的内容", a:"①纵向受力钢筋的牌号、规格、数量、位置等；\n②钢筋的连接方式、搭接长度、锚固方式及锚固长度、接头位置、接头质量、接头面积百分率；\n③箍筋、横向钢筋的规格、位置、数量、间距、牌号，箍筋弯钩的弯折角度及平直段长度；\n④预埋件的规格、数量、位置等。", page:"P278", tip:"连接搭接和锚固，三个接头100分；规位数箍牌"},
  {id:218, q:"砖砌体工程主控项目", a:"①砖和砂浆的强度等级必须符合设计要求。\n②砖砌体的转角处和交接处应同时砌筑；\n③砖墙水平灰缝的砂浆饱满度不得低于80%,砖柱水平灰缝和竖向灰缝的饱满度不得低于90%。", page:"P280", tip:"砖砂强度同时砌 砖墙80柱90"},
  {id:219, q:"钢结构焊接主控项目", a:"①一二级焊缝应进行内容缺陷的无损检测\n②焊接材料使用前，应进行烘焙和存放\n③持证焊工必须在证书规定的范围内施焊，严禁无证焊工施焊\n④施工单位应进行焊接工艺评定，编写焊接工艺规程", page:"P281", tip:"内部材料焊单位"},
  {id:220, q:"钢结构螺栓连接主控项目", a:"①钢结构制作和安装单位分别进行抗滑移系数试验和复验\n②现场处理的构件单独进行抗滑移系数试验\n③终拧完成1h后、48h内进行终拧检查", page:"P281", tip:""},
  {id:221, q:"边坡塌方的原因", a:"①开挖坡度不够、次序方法不当\n②顶部堆载过大\n③外力振动、地质构造影响\n④有地下水地表水，未采取排水措施\n⑤土质松软", page:"P283", tip:"开挖顶部响水土"},
  {id:222, q:"干作业成孔桩孔底虚土多的治理方法", a:"①孔内多次投钻\n②勾钻清理虚土\n③采用孔底夯实法、压力灌混凝土法、压力灌浆法", page:"P284", tip:"多次勾钻，夯实砼浆"},
  {id:223, q:"泥浆护壁塌孔原因及治理", a:"原因：①炸药量过大；\n②撞击孔壁；\n③进尺速度太快；\n④水头高度不够；\n⑤泥浆比重不够；\n⑥护筒埋置太浅。\n治理：①选用较大相对密度、黏度、胶体率的优质泥浆\n②如地下水位变化过大，应采取升高护筒、增大水头、虹吸管连接\n③严格控制冲程高度和炸药用量。\n④孔口坍塌时，应先探明位置，将砂和黏土、黄土混合物回填到坍孔位置以上1~2m;\n如坍孔严重，应全部回填，等回填物沉积密实后再进行钻孔", page:"P284", tip:"炸药装进水泥桶，高增虹，胶度密"},
  {id:224, q:"钢筋混凝土主要质量问题有哪些", a:"①钢筋错位\n②混凝土收缩裂缝\n③混凝土构件尺寸轴线位置偏差大\n④混凝土表面缺陷\n⑤混凝土强度等级达不到设计要求", page:"P283", tip:"肛裂位置表面强"},
  {id:225, q:"钢筋错位的原因", a:"①未按照设计尺寸进行加工安装\n②未考虑主筋的位置及避让关系\n③踩踏、碰撞移位\n④保护层垫块尺寸位置不准确", page:"P284", tip:"设计主筋踩垫块"},
  {id:226, q:"混凝土构件尺寸、轴线位置偏差大的原因及治理", a:"原因：①未按图施工或误差过大。\n②模板及支撑架的强度、刚度不足。\n③支撑基座不实，受力变形大。\n治理：①按图施工\n②保证模板不变形、不失稳、不跑模\n③确保支撑基座坚实\n④对模板体系进行监测，发现问题及时纠正", page:"P286", tip:"监测三不图基模"},
  {id:227, q:"混凝土收缩裂缝的现象、原因及防治措施有哪些?", a:"现象：凝结、沉陷、干燥、塑态、碳化收缩\n原因：\n①水泥、掺合料用量超出规范规定\n②原材料质量不合格\n③养护不及时或养护差\n④混凝土水胶比、坍落度偏大\n防治措施：\n①选用合格的原材料。\n②由有资质的试验室配制合适的混凝土配合比，并确保搅拌质量。\n③确保混凝土浇筑振捣密实，并在初凝前进行二次抹压。\n④确保混凝土及时养护，并保证养护质量满足要求。", page:"P285", tip:"凌晨干太太 水泥材料养胶比 原配教养振小二"},
  {id:228, q:"螺栓孔偏移较大的处理方法", a:"①经设计人员同意后割除螺栓；\n②将根部螺栓焊于预埋钢板上，附上一块与预埋钢板等厚的钢板；\n③采取铆钉塞焊法焊在预埋钢板上；\n④焊上新螺栓。", page:"P287", tip:"割除根部 预埋新螺栓"},
  {id:229, q:"装修常见的质量问题有哪些", a:"空鼓、开裂、渗漏、观感差", page:"P290", tip:""},
  {id:230, q:"饰面板、涂饰工程质量问题有哪些", a:"饰面板：空鼓、脱落、返碱、腐蚀\n涂饰：刷纹、掉粉、流坠、砂眼、咬色、透底、起皮", page:"P290", tip:"反腐落空，刷掉流沙咬透皮"},
  {id:231, q:"装修地面空鼓的原因及治理", a:"①铺贴前清理不干净\n②水灰比不合理\n③采用了油性养护剂\n④未保证足够的养护条件\n⑤未合理布置伸缩缝", page:"P291", tip:"净水护养身"},
  {id:232, q:"石膏板吊顶开裂的原因", a:"①吊筋间距过宽\n②吊顶面积过大\n③螺钉未固定牢固\n④转角、造型部位拼缝振动变形\n⑤阴角、接缝部位嵌缝不到位", page:"P291", tip:"见面钉缝缝"},
  {id:233, q:"地基基础工程的子分部", a:"地基、基础、地下防水、地下水控制、基坑支护、土方、边坡、", page:"P294", tip:"地基防水护土坡"},
  {id:234, q:"边坡的分项工程", a:"喷锚支护、挡土墙、边坡开挖", page:"P294", tip:""},
  {id:235, q:"地下防水有哪些分项工程", a:"特殊施工法结构防水、主体结构防水、细部构造防水、注浆、排水、", page:"P294", tip:"特殊主体不注水"},
  {id:236, q:"地下防水验收文件及记录", a:"①防水设计②资质、资格证明③施工方案④技术交底\n⑤材料质量证明：产品合格证、产品性能检测报告、材料进场检验报告；\n⑥混凝土、砂浆质量证明：试配及施工配合比、混凝土抗压强度、抗渗性能检验报告、砂浆粘结强度、抗渗性能检验报告；\n⑦中间检查记录：施工质量验收记录、隐蔽工程验收记录、施工检查记录；\n⑧检验记录：渗漏水检测记录、观感质量检查记录；\n⑨施工日志⑩其他资料", page:"P294", tip:"防水日志两记录，技术方案五证明 查B质量看漏水"},
  {id:237, q:"地基基础工程验收程序", a:"施工企业自评、设计认可、监理核定、业主验收、政府监督", page:"P295", tip:"自认核验证件"},
  {id:238, q:"地基基础工程验收资料", a:"竣工图、图纸会审记录、设计文件、隐蔽工程验收资料、岩土勘察报告、检测检验报告，自评报告", page:"P295", tip:"图图设B三报告"},
  {id:239, q:"主体结构验收资料", a:"①主体工程验收通知书；\n②工程规划许可证复印件(需加盖建设单位公章)；\n③中标通知书复印件(需加盖建设单位公章)；\n④工程施工许可证复印件(需加盖建设单位公章)；\n⑤结构实体混凝土强度验收记录；\n⑥结构实体钢筋保护层厚度验收记录。", page:"P296", tip:"华师验标强保护"},
  {id:240, q:"基础、主体结构验收的条件", a:"①施工孔洞须镶堵密实\n②标高控制线弹出墨线\n③完成样板间的室内粉刷（主体）\n④技术资料存在问题均已整改\n⑤模板拆除，结构缺陷已整改\n⑥质监站发出整改通知书已整改\n⑦体分部的内容已完成\n⑧管道预埋结束，位置尺寸准确，测试完成", page:"P297", tip:"孔密墨线刷整改"},
  {id:241, q:"混凝土结构实体检验的管理程序", a:"①施工单位应制订结构实体检验专项方案，并经监理单位审核批准后实施\n②由监理单位组织施工单位实施，并见证实施过程。\n③除结构位置与尺寸偏差外的结构实体检验项目，应由具有相应资质的检测机构完成。", page:"P298", tip:"施工监理，见证检测"},
  {id:242, q:"装修隐蔽工程项目", a:"地垄墙钢筋绑扎、石材钢骨架焊接、卫生间防水、龙骨隔墙、吊顶明暗龙骨", page:"P298", tip:"地垄石材防龙骨"},
  {id:243, q:"抹灰工程包含哪些分项", a:"一般抹灰、保温层薄抹灰、装饰抹灰、清水砌体勾缝", page:"P298", tip:""},
  {id:244, q:"门窗工程包含哪些分项", a:"特种门、门窗玻璃、塑料门窗、金属门窗、木门窗安装", page:"P298", tip:"特种玻璃料金木"},
  {id:245, q:"轻质隔墙包含哪些分项", a:"板材、骨架、活动、玻璃隔墙", page:"P298", tip:"搬古董玻"},
  {id:246, q:"单位工程验收合格标准及资料缺失时的处理办法", a:"①分部工程质量均合格\n②控制资料完整\n③安全、节能、环保、主要功能的检验资料完整\n④观感质量符合要求\n⑤主要使用功能抽查结果符合要求\n验收资料缺失时，应委托有资质的检测机构进行实体检验和抽样试验", page:"P301", tip:"分资全能看功能"},
  {id:247, q:"成本预测方法", a:"定性预测法：专家会议法、德尔菲法、主观概率法、经验评判法\n定量预测法：简单平均法、回归分析法、指数平滑法、高低点法、量本利法", page:"P302", tip:"评分指高量"},
  {id:248, q:"项目成本计划编制原则", a:"可行性、先进性、科学性、统一性、适时性", page:"P302", tip:"可先学一时"},
  {id:249, q:"项目成本计划编制依据", a:"①项目目标责任书\n②工程量\n③成本控制指标\n④劳务分包合同及其他分包合同\n⑤企业定额\n⑥施工方案", page:"P303", tip:"书工控分定方案"},
  {id:250, q:"成本计划编制程序", a:"①搜集和整理各类有关资料。\n②分解目标成本。\n③编制成本计划草案。\n④编制正式的成本计划。", page:"P303", tip:"搜集分解编草正"},
  {id:251, q:"目标成本分解方法", a:"①根据总工期生产进度网络节点计划分解\n②按月形象进度计划分解；\n③按项目直接成本和间接成本分解；\n④按工、料、机费用分解。", page:"P303", tip:"总工形象接公鸡"},
  {id:252, q:"施工项目成本有哪些", a:"生产成本、质量成本、工期成本、不可预见成本(例如罚款)", page:"P303", tip:"不可生工资"},
  {id:253, q:"商务部门成本管理的措施", a:"加强合同、计量、签证、索赔、结算、决算等管理", page:"P303", tip:""},
  {id:254, q:"成本基本分析法", a:"因素分析法、差额计算法、比较法、比率法", page:"P303", tip:"因饿焦虑"},
  {id:255, q:"按价值公式分析，提高价值的途径有哪些? 怎么选择价值工程的对象?", a:"途径：①功能提高，成本不变；\n②功能不变，成本降低；\n③功能提高，成本降低；\n④降低辅助功能，大幅度降低成本；\n⑤成本稍有提高，大大提高功能。\n对象：应选择价值系数低、成本潜力大的工程", page:"P307", tip:""},
  {id:256, q:"赢得值法三项成本值是什么", a:"已完成工作预算成本、计划完成工作预算成本、已完成工作实际成本", page:"P308", tip:""},
  {id:257, q:"成本考核要求需确定哪些内容", a:"对象、方式、组织领导、目的、指标、时间、评价与奖惩原则、范围、依据、", page:"P311", tip:"对方领导目标是评奖"},
  {id:258, q:"成本管理绩效指标", a:"产值利润率、劳动生产率、劳动消耗指标、材料消耗指标、机械消耗指标、降低成本额和降低成本率等指标完成情况", page:"P310", tip:"消耗人材机，降低劳动产值"},
  {id:259, q:"成本考核的主要指标", a:"成本降低额、项目成本降低率", page:"P310", tip:""},
  {id:260, q:"成本考核内容有哪些", a:"①目标成本和阶段性成本目标的完成情况；\n②成本责任制落实情况；\n③成本计划的编制和落实情况；\n④各部门、 岗位的责任成本的检查和考核情况\n⑤成本核算的真实性、符合性；\n⑥考核兑现。", page:"P311", tip:"完落，考核真兑现"},
  {id:261, q:"安全教育的类型有哪些", a:"三级教育(企业、项目、班组)、年度继续教育、 岗前教育、日常教育、各类上岗证书的初审复审培训", page:"P312", tip:"三年前的日出"},
  {id:262, q:"安全生产教育培训的对象有哪些", a:"负责人、管理人员、特殊工种、新上岗、待岗复工、转岗、换岗的作业人员", page:"P312", tip:"新待转换管特殊"},
  {id:263, q:"新上岗工人教育培训的内容", a:"①应急救援的基本知识、方法和措施\n②安全防护措施\n③安全生产法律法规和规章制度；\n④安全操作规程；\n⑤违章指挥、违章作业、违反劳动纪律产生的后果。", page:"P313", tip:"救援护法操三违"},
  {id:264, q:"对所有从业人员教育培训的内容", a:"①新颁布的安全生产法律法规、安全技术标准规范和规范性文件\n②先进的安全生产技术和管理经验；\n③典型事故案例分析。", page:"P312", tip:"新规先进管典型"},
  {id:265, q:"施工企业对分包单位的安全生产管理要求", a:"①选择合法的分包单位；\n②与分包单位签订安全协议；\n③清退不符合要求的分包单位；\n④对分包单位实施检查和考核；\n⑤对分包单位安全生产能力进行评价。", page:"P314", tip:"合法协议退考评"},
  {id:266, q:"施工企业对分包单位检查考核的内容", a:"①分包单位违约 、违章情况;\n②分包单位安全生产管理机构的设置、人员配备及资格情况；\n③分包单位安全生产绩效。", page:"P314", tip:"二违人员设绩效"},
  {id:267, q:"专职安全员安全生产管理职责", a:"①对危险性较大的分部分项工程应依据方案实施监督并做好记录；\n②应建立项目安全生产管理档案，并应定向企业报告项目安全生产情况\n③对项目实施巡查，阻止和处理违章指挥、违章作业和违反劳动纪律等现象，并做好记录；", page:"P343", tip:"监督档案巡三违"},
  {id:268, q:"应急救援管理的内容", a:"建立组织机构、预案编制、审批、演练、评价、完善工作程序", page:"P314", tip:"建预审，演评完"},
  {id:269, q:"重大危险源控制系统有哪些", a:"辨识、应急救援预案、管理、评价、安全报告", page:"P316", tip:"辨识预案管平安"},
  {id:270, q:"施工现场经常安全性检查方式主要有?", a:"a. 现场专(兼)职安全生产管理人员及安全值班人员每天例行开展的安全巡视、巡查。\nb. 现场项目经理、责任工程师及相关专业技术管理人员在检查生产工作的同时进行的安全检查。\nc. 作业班组在班前、班中、班后进行的安全检查。", page:"P317", tip:"每天同时查三班"},
  {id:271, q:"安全检查的三定原则的内容", a:"定人、定期限、定措施", page:"P318", tip:""},
  {id:272, q:"安全检查的十大分项表", a:"安全管理、文明施工、脚手架、基坑、模板、高处作业、施工升降机、施工用电、起重吊装、施工机具", page:"P319", tip:"安文脚基模，高升电重机"},
  {id:273, q:"施工升降机的保证项目和一般项目", a:"保证项目：安全装置、限位装置、防护设施、附墙架、安拆验收、滑轮对重、钢丝绳\n一般项目：导轨架、基础、电气安全、通信装置", page:"P320", tip:"安限护墙拆滑丝"},
  {id:274, q:"施工用电保证项目和一般项目", a:"保证项目：外电防护、接地与接零保护系统、配电线路、配电箱与开关箱。\n一般项目：配电室与配电装置、现场照明、用电档案。", page:"P320", tip:"外接线箱"},
  {id:275, q:"施工机具检查评定项目", a:"平刨、圆盘锯、手持电动工具、钢筋机械、电焊机、搅拌机、气瓶、翻斗车、潜水泵、振捣器、桩工机械", page:"P320", tip:""},
  {id:276, q:"脚手架地基的要求", a:"(1)应平整坚实，满足承载力和变形要求；\n(2)应设置排水设施，搭设场地不应积水；\n(3)冬期施工应采取防冻胀措施。", page:"P324", tip:"积水冻坚实"},
  {id:277, q:"脚手架检查阶段有哪些", a:"①基础完工后脚手架搭设前\n②首层水平杆搭设后\n③悬挑结构搭设固定后\n④每搭设一个楼层高度\n⑤搭设高度每2-4步或不大于6米", page:"P326", tip:"基础首层做悬挑，每层高度是6米"},
  {id:278, q:"主体结构易发生的安全事故有哪些", a:"触电、机械伤害、重物吊装、物体打击、脚手架失稳、模板坍塌、高空坠落", page:"P326", tip:"电机重物脚踏空"},
  {id:279, q:"钢结构安装的主要安全隐患", a:"①高处作业及临边洞口安全防护不符合安全要求\n②对易发生职业病的作业人员专项保护措施不符合安全要求\n③未形成稳固的空间刚度单元\n④安装机械设备的技术性能、承载能力和使用条件不符合安全要求", page:"P327", tip:"高职业未泄"},
  {id:280, q:"砌体砌筑主要安全隐患", a:"①高处作业安全防护设施不符合要求\n②支撑架体受力不均衡\n③砌体堆放或砌筑高度不符合要求\n④机械设备的安装、使用不符合要求", page:"P326", tip:"高力士放鞋"},
  {id:281, q:"现浇混凝土工程安全控制内容", a:"①高处作业安全\n②浇筑设备使用安全\n③模板支撑系统设计\n④模板支持施工安全", page:"P327", tip:"高处设支拆"},
  {id:282, q:"装配式混凝土工程安全控制内容", a:"①高处作业安全。\n②垂直运输设备使用安全。\n③构件运输及存放作业安全\n④构件安装作业安全", page:"P327", tip:"高处设梳妆"},
  {id:283, q:"钢结构工程安全控制内容", a:"①高处作业安全。\n②工程设备使用及用电安全\n③安装作业及支撑措施\n④作业区安全防护措施。", page:"327", tip:"高处设装区"},
  {id:284, q:"砌体工程安全控制内容", a:"①高处安全防护\n②作业脚手架架体安全防护\n③作业安全", page:"327", tip:"高处架体作业"},
  {id:285, q:"起重机械设备管理要点", a:"①安装拆除时，应有技术方案\n②定期检查限位装置\n③群塔作业应采取防碰撞措施\n④满足施工方案要求\n⑤采用非定型吊装机械时，要进行安全验算\n⑥应做到\"十不吊\"", page:"P331", tip:"安拆限位要检查，群塔方案要验算"},
  {id:286, q:"起重钢丝绳哪些情况应报废", a:"绳芯挤出、结构变形、死弯、钢丝绳断丝数在一个节距中超过10%、钢丝绳锈蚀或表面磨损达40%", page:"P332", tip:"绳芯变弯3个十"},
  {id:287, q:"高处作业安全防护设施验收内容", a:"①攀登与悬空作业的用具与设施搭设；\n②防护栏杆的设置与搭设\n③防护棚的搭设；\n④操作平台及平台防护设施的搭设；\n⑤安全防护设施、设备的性能与质量、所用的材料、配件的规格\n⑥安全网的设置；\n⑦设施的节点构造，材料配件的规格、材质及其与建筑物的固定、连接状况", page:"P333", tip:"攀悬男朋操设网"},
  {id:288, q:"高处作业安全防护设施验收资料", a:"①施工组织设计中的安全技术措施或施工方案；\n②预埋件隐蔽验收记录；\n③安全防护设施验收记录；\n④安全防护设施变更记录\n⑤安全防护用具用品、材料和设备产品合格证明", page:"P333", tip:"施组预埋三防护"},
  {id:289, q:"交叉作业时，坠落半径内的安全防护要求", a:"应设置安全防护棚或安全防护网，未设置安全隔离措施时，应设置警戒隔离区，严禁人员进入隔离器", page:"P337", tip:""},
  {id:290, q:"塔式起重机拆装必须配备的人员有哪些", a:"①项目负责人和安全负责人、机械管理人员；\n②起重机械安装拆卸工、起重司机、起重信号工、司索工。", page:"P338", tip:"安拆司机索信号"},
  {id:291, q:"塔吊突然停电时的操作步骤", a:"应立即把所有控制器拨到零位，断开电源开关，并采取措施将重物安全降到地面，严禁起吊重物后长时间悬挂空中", page:"P338", tip:"拨零断电降地面"},
  {id:292, q:"试吊时应进行哪些检查", a:"机械状况、制动性能、物件绑扎情况", page:"P338", tip:""},
  {id:293, q:"土方机械作业前的安全管理要点", a:"查明施工场地明、暗设置物（电线电缆管道坑道）的地点及走向，采用明显记号标识，严禁在离电缆1m距离内作业", page:"P338", tip:""},
  {id:294, q:"施工电梯限位正式投用前的检查内容", a:"检查各限位装置，无误后先将梯笼升至离地面1m 处停车检查制动是否符合要求，然后继续上行试验楼层站台、防护门、上限位以及前、后限位，并观察运转情况，确认正常后，方可正式投入使用", page:"P339", tip:"限位制动上站台，运转防护上后门"},
  {id:295, q:"焊接作业时应采取哪些安全措施", a:"防止触电、中毒、火灾、窒息、高空坠落等措施", page:"P340", tip:""},

// ---------- Storage ----------
// 优先使用浏览器 localStorage,这样用普通浏览器直接打开这个文件时,
// 收藏/掌握/薄弱标记和做题进度也能跨次保存。
const STORAGE_PREFIX = 'case300_';
let memoryStore = {};
async function storeGet(key){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if(raw !== null) return JSON.parse(raw);
  }catch(e){ /* localStorage unavailable (e.g. private mode) */ }
  return memoryStore[key] !== undefined ? memoryStore[key] : null;
}
async function storeSet(key, value){
  memoryStore[key] = value;
  try{
    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
  }catch(e){ /* fall back silently to in-memory only for this session */ }
}

// ---------- State ----------
let state = {
  index: 0,
  mode: 'single',        // single | batch
  filter: 'all',         // all | weak | star
  revealed: {},          // {id: true}
  stars: {},             // {id: true}
  status: {},            // {id: 'master' | 'weak'}
  drafts: {}             // {id: '我的练习作答文字'}
};

function visibleList(){
  if(state.filter === 'all') return QUESTIONS;
  if(state.filter === 'star') return QUESTIONS.filter(q => state.stars[q.id]);
  if(state.filter === 'weak') return QUESTIONS.filter(q => state.status[q.id] === 'weak');
  return QUESTIONS;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1200);
}

function render(){
  const list = visibleList();
  const main = document.getElementById('main');
  const counter = document.getElementById('counter');
  const progressFill = document.getElementById('progressFill');

  if(list.length === 0){
    main.innerHTML = '<div class="empty-state"><div class="big">这里还没有题目</div>暂无符合条件的题目,换个筛选试试</div>';
    counter.textContent = '0/0';
    progressFill.style.width = '0%';
    return;
  }

  if(state.index >= list.length) state.index = list.length - 1;
  if(state.index < 0) state.index = 0;

  const item = list[state.index];
  counter.textContent = (state.index+1) + '/' + list.length;
  progressFill.style.width = ((state.index+1)/list.length*100) + '%';

  const isRevealed = state.mode === 'batch' ? !!state.revealed['__batchAll'] || !!state.revealed[item.id] : !!state.revealed[item.id];
  const starred = !!state.stars[item.id];
  const status = state.status[item.id];

  const draftVal = state.drafts[item.id] || '';

  let html = '<div class="card" id="questionCard">';
  html += '<button class="star-btn ' + (starred?'on':'') + '" data-star="'+item.id+'">' + (starred?'★':'☆') + '</button>';
  html += '<div class="card-tag"><span class="qnum mono">Q'+item.id+'</span><span class="page-ref mono">'+ (item.page||'') +'</span></div>';
  html += '<div class="q-text">'+ escapeHtml(item.q) +'</div>';

  if(isRevealed){
    if(draftVal){
      html += '<div class="divider"></div>';
      html += '<div class="label">我的作答</div>';
      html += '<div class="my-answer-text">'+ escapeHtml(draftVal) +'</div>';
    }
    html += '<div class="divider"></div>';
    html += '<div class="label">参考答案</div>';
    html += '<div class="answer-text">'+ escapeHtml(item.a) +'</div>';
    if(item.tip){
      html += '<div class="divider"></div>';
      html += '<div class="label">记忆点 '+ (item.page?('· '+item.page):'') +'</div>';
      html += '<div class="tip-text">'+ escapeHtml(item.tip) +'</div>';
    }
    html += '<div class="self-check">';
    html += '<button class="master '+(status==='master'?'on':'')+'" data-status="master" data-id="'+item.id+'">✓ 掌握了</button>';
    html += '<button class="weak '+(status==='weak'?'on':'')+'" data-status="weak" data-id="'+item.id+'">✗ 还不熟</button>';
    html += '</div>';
  } else {
    html += '<div class="practice-box">';
    html += '<div class="practice-label">✏️ 先写下你的答案（选填）</div>';
    html += '<textarea id="practiceInput" placeholder="在这里练习作答，再点下方查看答案对比…">'+ escapeHtml(draftVal) +'</textarea>';
    html += '</div>';
    html += '<button class="reveal-btn" id="revealBtn">查看答案</button>';
  }
  html += '</div>';
  html += '<div class="swipe-hint">← 左右滑动切换题目 →</div>';

  main.innerHTML = html;

  const practiceInput = document.getElementById('practiceInput');
  if(practiceInput){
    practiceInput.addEventListener('input', ()=>{
      state.drafts[item.id] = practiceInput.value;
      storeSet('drafts', state.drafts);
    });
  }

  const revealBtn = document.getElementById('revealBtn');
  if(revealBtn){
    revealBtn.addEventListener('click', ()=>{
      if(practiceInput){
        state.drafts[item.id] = practiceInput.value;
        storeSet('drafts', state.drafts);
      }
      state.revealed[item.id] = true;
      render();
    });
  }
  setupSwipe();
  const starBtn = main.querySelector('[data-star]');
  starBtn.addEventListener('click', async ()=>{
    state.stars[item.id] = !state.stars[item.id];
    await storeSet('stars', state.stars);
    render();
  });
  main.querySelectorAll('[data-status]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-id');
      const val = btn.getAttribute('data-status');
      state.status[id] = (state.status[id] === val) ? undefined : val;
      await storeSet('status', state.status);
      render();
    });
  });

  document.getElementById('prevBtn').disabled = state.index === 0;
}

// ---------- Swipe to switch question ----------
function setupSwipe(){
  const card = document.getElementById('questionCard');
  if(!card) return;
  let startX = 0, startY = 0, deltaX = 0, isSwiping = false, isHorizontal = null;
  const threshold = 60;
  const decideThreshold = 10; // 累计滑动超过这个距离才判断方向,避免手指抖动误判

  card.addEventListener('touchstart', (e)=>{
    if(state.mode !== 'single') return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0;
    isHorizontal = null;
    isSwiping = true;
  }, {passive:true});

  card.addEventListener('touchmove', (e)=>{
    if(!isSwiping || state.mode !== 'single') return;
    deltaX = e.touches[0].clientX - startX;
    const deltaY = e.touches[0].clientY - startY;

    if(isHorizontal === null){
      const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
      if(dist < decideThreshold) return; // 还太小,先不判断方向,让浏览器保留纵向滚动能力
      isHorizontal = Math.abs(deltaX) > Math.abs(deltaY);
      if(!isHorizontal){ isSwiping = false; return; } // 判定为纵向滚动,交还给浏览器原生滚动
    }

    if(isHorizontal){
      e.preventDefault(); // 阻止页面在横滑过程中跟着上下滚动
      card.classList.add('swiping');
      card.style.transform = 'translateX(' + deltaX + 'px) rotate(' + (deltaX/40) + 'deg)';
      card.style.opacity = String(1 - Math.min(Math.abs(deltaX)/280, 0.55));
    }
  }, {passive:false});

  function endSwipe(){
    if(!isSwiping || state.mode !== 'single' || !isHorizontal){ isSwiping = false; return; }
    isSwiping = false;
    card.classList.remove('swiping');
    card.classList.add('swipe-return');
    if(deltaX < -threshold){
      const list = visibleList();
      card.style.transform = 'translateX(-130%) rotate(-8deg)';
      card.style.opacity = '0';
      setTimeout(()=>{
        if(state.index < list.length - 1){ state.index++; storeSet('lastIndex', state.index); }
        else { showToast('已经是最后一题啦'); }
        render();
      }, 200);
    } else if(deltaX > threshold){
      card.style.transform = 'translateX(130%) rotate(8deg)';
      card.style.opacity = '0';
      setTimeout(()=>{
        if(state.index > 0){ state.index--; storeSet('lastIndex', state.index); }
        render();
      }, 200);
    } else {
      card.style.transform = 'translateX(0) rotate(0)';
      card.style.opacity = '1';
    }
  }

  card.addEventListener('touchend', endSwipe);
  card.addEventListener('touchcancel', endSwipe);
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---------- Controls ----------
document.getElementById('modeSingle').addEventListener('click', ()=>{
  state.mode = 'single';
  document.getElementById('modeSingle').classList.add('active');
  document.getElementById('modeBatch').classList.remove('active');
  state.revealed['__batchAll'] = false;
  render();
});
document.getElementById('modeBatch').addEventListener('click', ()=>{
  state.mode = 'batch';
  document.getElementById('modeBatch').classList.add('active');
  document.getElementById('modeSingle').classList.remove('active');
  render();
});

document.querySelectorAll('[data-filter]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.filter = btn.getAttribute('data-filter');
    state.index = 0;
    render();
  });
});

document.getElementById('revealAllBtn').addEventListener('click', ()=>{
  if(state.mode !== 'batch'){
    showToast('请先切换到"整体模式"');
    return;
  }
  state.revealed['__batchAll'] = true;
  showToast('已显示本组全部答案');
  render();
});

document.getElementById('prevBtn').addEventListener('click', ()=>{
  if(state.index > 0){ state.index--; render(); }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  const list = visibleList();
  if(state.index < list.length - 1){ state.index++; render(); storeSet('lastIndex', state.index); }
  else { showToast('已经是最后一题啦'); }
});
document.getElementById('shuffleBtn').addEventListener('click', ()=>{
  const list = visibleList();
  if(list.length <= 1) return;
  let n;
  do{ n = Math.floor(Math.random()*list.length); } while(n === state.index);
  state.index = n;
  render();
});
function renderGrid(){
  const list = visibleList();
  const body = document.getElementById('gridBody');
  let html = '';
  list.forEach((item, i) => {
    let cls = 'grid-item';
    if(i === state.index) cls += ' current';
    if(state.status[item.id] === 'weak') cls += ' weak';
    if(state.stars[item.id]) cls += ' star';
    html += '<div class="'+cls+'" data-i="'+i+'">'+item.id+'</div>';
  });
  body.innerHTML = html;
  body.querySelectorAll('.grid-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.index = parseInt(el.getAttribute('data-i'), 10);
      document.getElementById('gridOverlay').classList.add('hidden');
      render();
    });
  });
}
document.getElementById('gridBtn').addEventListener('click', ()=>{
  renderGrid();
  document.getElementById('gridOverlay').classList.remove('hidden');
});
document.getElementById('closeGrid').addEventListener('click', ()=>{
  document.getElementById('gridOverlay').classList.add('hidden');
});
document.getElementById('gridOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'gridOverlay'){ document.getElementById('gridOverlay').classList.add('hidden'); }
});

// ---------- Init ----------
(async function init(){
  const savedStars = await storeGet('stars');
  const savedStatus = await storeGet('status');
  const savedIndex = await storeGet('lastIndex');
  const savedDrafts = await storeGet('drafts');
  if(savedStars) state.stars = savedStars;
  if(savedStatus) state.status = savedStatus;
  if(typeof savedIndex === 'number') state.index = savedIndex;
  if(savedDrafts) state.drafts = savedDrafts;
  render();
})();

})();
</script>
</body>
</html>
